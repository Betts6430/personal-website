<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timeline coming soon</title>
    <style>
      /* Placeholder for the planned timeline scene (a day-to-night campsite
         where the scroll is time passing). Static page, no WebGL, so the
         "Timeline" waysign in the caravan always lands somewhere real.
         Warm sunrise palette, flat colors, crisp borders. No em dashes. */
      :root {
        --night: #241a10;
        --parchment: #ece2cd;
        --parchment-dim: #ddceac;
        --ink: #241d15;
        --gold: #c8892f;
        --gold-deep: #9c621d;
        --stone: #6b6257;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: var(--night);
        color: var(--ink);
        font-family: Georgia, "Palatino Linotype", "Times New Roman", serif;
      }
      .card {
        max-width: 440px;
        width: 100%;
        text-align: center;
        padding: 40px 34px;
        background: var(--parchment);
        border: 1px solid var(--stone);
        outline: 1px solid var(--parchment-dim);
        outline-offset: -5px;
      }
      .kicker {
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--gold-deep);
        margin-bottom: 12px;
      }
      h1 {
        font-size: 2.6rem;
        line-height: 1.1;
        margin-bottom: 16px;
      }
      p {
        font-size: 1.02rem;
        line-height: 1.55;
        margin-bottom: 10px;
      }
      nav {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px 22px;
        margin-top: 26px;
      }
      a {
        color: var(--gold-deep);
        font-size: 0.95rem;
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
      }
      a:hover {
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="kicker">Avery Bettesworth</p>
      <h1>Timeline</h1>
      <p>This chapter is still being built: a campsite from dawn to night, where scrolling is time passing and each milestone appears as the light fades.</p>
      <p>Check back soon.</p>
      <nav>
        <a href="index.html">Back to the mountain</a>
        <a href="projects.html">See the projects</a>
      </nav>
    </main>
  </body>
</html>
